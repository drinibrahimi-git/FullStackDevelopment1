<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="slideWrapper">
        <div class="slide">
            <img src="img/OIP (1).webp" style="width: 100%;">
        </div>
        <div class="slide">
            <img src="img/OIP (2).webp" style="width: 100%;">
        </div>
        <div class="slide">
            <img src="img/OIP.webp" style="width: 100%;">
        </div>
    </div>

    <a class="prev"><img src="img/leftarrow.png" style="width: 50px;height: 50px;" onclick="plusSlides(-1)"></a>
    <a class="next"><img src="img/rightarrow.png" style="width: 50px;height: 50px;" onclick="plusSlides(-1)"></a>

    


<script src="js/main.js"></script>    
</body>
</html>
